name: Build Desktop App

on:
  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.1). Leave blank to use package.json version.'
        required: false
        default: ''
  # Automatic on tag push matching v*
  push:
    tags:
      - 'v*'
    # Also auto-build when the version or build config changes on main
    branches:
      - main
    paths:
      - 'package.json'
      - 'electron/**'
      - '.github/workflows/build-desktop.yml'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Derive version from tag or input
        shell: bash
        run: |
          V=""
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          fi
          if [ -n "$V" ]; then
            node -e "const fs=require('fs');const p=require('./package.json');p.version='$V';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
            echo "Version set to $V"
          else
            echo "Using package.json version: $(node -p "require('./package.json').version")"
          fi

      - name: Build + publish Electron app (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:${{ matrix.platform }} -- --publish always
