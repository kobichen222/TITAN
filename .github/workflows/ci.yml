name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  # Cancel older runs on the same branch as soon as a newer push arrives —
  # saves minutes when the author pushes rapid-fire fixups to a PR.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + vitest (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck core modules
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Report coverage
        if: matrix.node == '22'
        run: |
          echo "### Test results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx vitest run --reporter=basic 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  verify-html:
    name: public/index.html parse check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Parse inline <script> with Node
        run: |
          node -e "
            const fs=require('fs');
            const html=fs.readFileSync('public/index.html','utf8');
            const re=/<script(?![^>]*\\bsrc=)[^>]*>([\\s\\S]*?)<\\/script>/g;
            const scripts=[];let m;while((m=re.exec(html)))if(m[1]&&m[1].trim())scripts.push(m[1]);
            console.log('Found',scripts.length,'inline script block(s)');
            scripts.forEach((s,i)=>{try{new Function(s);console.log('  #'+i+' parses OK ('+s.length+' chars)');}catch(e){console.error('  #'+i+' PARSE ERROR:',e.message);process.exit(1);}});
          "
