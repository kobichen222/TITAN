name: Deploy to Vercel (Production)

# Vercel CLI defaults a plain `vercel` invocation to a *preview* deployment,
# which never inherits the project's production domain. This workflow forces
# every push to main through `vercel deploy --prod` so the production domain
# (configured under Project → Settings → Domains) is always assigned.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-prod
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Vercel secrets are configured
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Missing one of VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID. Add them under Repo → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifact to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
